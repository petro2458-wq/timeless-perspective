<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Timeless Perspective | Trading Psychology & Position Sizing</title>
  <meta name="description" content="Ex-petroleum exec turned futures trader. Author on position sizing and trading psychology. Free tools for serious traders." />
  <meta property="og:title" content="The Timeless Perspective | Trading Psychology & Position Sizing" />
  <meta property="og:description" content="Free tools and deep insights for serious traders. From a former petroleum exec turned full-time futures trader." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@CandyCabin75" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0b0d;
      --bg-secondary: #111218;
      --bg-card: #16171e;
      --border: #222333;
      --border-light: #2a2b3d;
      --text-primary: #e8e6e1;
      --text-secondary: #9b9aac;
      --text-muted: #5f5e70;
      --accent: #c9a55a;
      --accent-dim: #a6863e;
      --accent-glow: rgba(201, 165, 90, 0.15);
      --green: #4ecb71;
      --red: #e55b5b;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body); background: var(--bg-primary);
      color: var(--text-primary); line-height: 1.6;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    ::selection { background: var(--accent); color: var(--bg-primary); }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
      background: rgba(10,11,13,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid transparent; transition: border-color 0.3s;
    }
    .nav.scrolled { border-bottom-color: var(--border); }
    .nav-logo {
      font-family: var(--font-display); font-size: 1.3rem; font-weight: 600;
      color: var(--text-primary); letter-spacing: 0.02em; cursor: pointer;
      background: none; border: none; text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
      font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
      transition: color 0.2s; cursor: pointer;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-news-wrapper { position: relative; display: inline-block; margin-right: 0.75rem; padding-right: 1.75rem; border-right: 1px solid var(--border-light); }
    .nav-news {
      color: #ff6b6b; text-decoration: none; font-size: 0.85rem;
      font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s; position: relative;
      padding: 0.2rem 0; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .nav-news::before {
      content: ''; width: 6px; height: 6px; background: #ff6b6b;
      border-radius: 50%; display: inline-block;
      animation: newsPulse 2s ease-in-out infinite;
    }
    @keyframes newsPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .nav-news:hover { color: #ff9a9a; }
    .nav-news-tooltip {
      position: absolute; top: calc(100% + 12px); left: 50%; transform: translateX(-50%);
      background: #1a1b24; border: 1px solid var(--accent-dim); border-radius: 8px;
      padding: 0.75rem 1rem; width: 260px; opacity: 0; visibility: hidden;
      transition: all 0.25s ease; pointer-events: none; z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .nav-news-tooltip::before {
      content: ''; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(45deg);
      width: 10px; height: 10px; background: #1a1b24; border-left: 1px solid var(--accent-dim);
      border-top: 1px solid var(--accent-dim);
    }
    .nav-news-wrapper:hover .nav-news-tooltip { opacity: 1; visibility: visible; }
    .nav-news-tooltip p {
      font-size: 0.7rem; color: var(--text-secondary); line-height: 1.5;
      font-weight: 400; letter-spacing: 0; text-transform: none; margin: 0;
    }
    .nav-news-tooltip .tooltip-items {
      font-size: 0.65rem; color: var(--text-muted); margin-top: 0.4rem; line-height: 1.6;
    }
    .nav-news-tooltip .tooltip-items span { display: block; }
    .nav-news-tooltip .tooltip-items span::before { content: '▸ '; color: var(--accent); }

    .nav-cta {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
      padding: 0.5rem 1.2rem; font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: all 0.3s; font-family: var(--font-body);
    }
    .nav-cta:hover { background: var(--accent); color: var(--bg-primary); }

    .daily-news-page { padding: 5.5rem 1rem 2rem; background: var(--bg-primary); min-height: 100vh; }
    .daily-news-container { max-width: 1020px; margin: 0 auto; }
    .daily-news-meta {
      text-align: center; margin-bottom: 1rem; font-family: var(--font-mono);
      font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.1em;
    }
    .daily-news-content { border-radius: 12px; overflow: hidden; }

    .hero {
      min-height: auto; display: flex; flex-direction: column;
      justify-content: center; padding: 7rem 2rem 3rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -50%; right: -30%;
      width: 80vw; height: 80vw;
      background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner { max-width: 900px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }
    .hero-tag {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent);
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-tag::before { content: ''; width: 32px; height: 1px; background: var(--accent); }
    .hero h1 {
      font-family: var(--font-display); font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 400; line-height: 1.1; margin-bottom: 1.5rem;
    }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub {
      font-size: 1.1rem; color: var(--text-secondary); max-width: 600px;
      line-height: 1.7; margin-bottom: 1.5rem;
    }
    .hero-stats {
      display: flex; gap: 2.5rem; margin-bottom: 1.5rem;
      padding-top: 1.5rem; border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .hero-stat-value { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 600; color: var(--accent); }
    .hero-stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .btn-primary {
      background: var(--accent); color: var(--bg-primary); padding: 0.9rem 2rem; border: none;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover { background: #d4b268; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent; color: var(--text-primary); padding: 0.9rem 2rem;
      border: 1px solid var(--border-light); font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer; transition: all 0.3s; text-decoration: none;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    section { padding: 3rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-tag { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; }
    .section-title { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; line-height: 1.2; margin-bottom: 1rem; }
    .section-desc { font-size: 1rem; color: var(--text-secondary); max-width: 600px; line-height: 1.7; margin-bottom: 1.5rem; }

    .about { background: var(--bg-secondary); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .about-text p { color: var(--text-secondary); margin-bottom: 1.2rem; line-height: 1.8; }
    .about-text p strong { color: var(--text-primary); font-weight: 600; }
    .about-headshot {
      width: 160px; height: 160px; border-radius: 50%;
      border: 2px solid var(--accent-dim); object-fit: cover;
      margin-bottom: 1.5rem; background: var(--bg-card);
    }
    .about-milestones { display: flex; flex-direction: column; gap: 1.5rem; }
    .milestone { padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); transition: border-color 0.3s; }
    .milestone:hover { border-color: var(--accent-dim); }
    .milestone-year { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .milestone-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; margin-bottom: 0.4rem; }
    .milestone-desc { font-size: 0.85rem; color: var(--text-muted); }

    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .tool-card {
      background: var(--bg-card); border: 1px solid var(--border); padding: 2rem;
      transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden;
    }
    .tool-card:hover { border-color: var(--accent-dim); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .tool-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s;
    }
    .tool-card:hover::after { transform: scaleX(1); }
    .tool-icon {
      font-size: 1.5rem; margin-bottom: 1rem; width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-glow); border: 1px solid rgba(201,165,90,0.2);
    }
    .tool-status { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.6rem; display: inline-block; margin-bottom: 0.75rem; }
    .tool-status.live { color: var(--green); border: 1px solid rgba(78,203,113,0.3); background: rgba(78,203,113,0.08); }
    .tool-status.coming { color: var(--text-muted); border: 1px solid var(--border); }
    .tool-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
    .tool-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }

    .book { background: var(--bg-secondary); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .book-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 3rem; align-items: center; }
    .book-cover {
      aspect-ratio: 3/4; background: linear-gradient(145deg, #1a1b24 0%, #0d0e14 100%);
      border: 1px solid var(--border); display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 3rem; text-align: center; position: relative;
    }
    .book-cover::before { content: ''; position: absolute; inset: 12px; border: 1px solid var(--accent-dim); opacity: 0.3; }
    .book-cover-tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1.5rem; }
    .book-cover-title { font-family: var(--font-display); font-size: 2rem; font-weight: 600; line-height: 1.2; margin-bottom: 0.5rem; }
    .book-cover-subtitle { font-family: var(--font-display); font-size: 1rem; font-style: italic; color: var(--text-secondary); }
    .book-info h3 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 400; margin-bottom: 1.2rem; }
    .book-info h3 em { font-style: italic; color: var(--accent); }
    .book-info p { color: var(--text-secondary); line-height: 1.8; margin-bottom: 1rem; }
    .book-quote { border-left: 2px solid var(--accent); padding: 1rem 1.5rem; margin: 2rem 0; font-family: var(--font-display); font-size: 1.2rem; font-style: italic; color: var(--text-primary); line-height: 1.6; }

    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .blog-card { 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      transition: all 0.3s; 
      overflow: hidden; 
      cursor: pointer;
    }
    .blog-card:hover { border-color: var(--accent-dim); transform: translateY(-4px); }
    .blog-banner { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .blog-card-body { padding: 1.5rem 2rem 2rem; }
    .blog-date { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .blog-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; }
    .blog-excerpt { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
    .blog-tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1rem; display: inline-block; }

    .reading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .reading-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem 1.75rem; transition: all 0.3s; position: relative; }
    .reading-card:hover { border-color: var(--accent-dim); }
    .reading-card.mentor { border-left: 2px solid var(--accent); }
    .reading-mentor-badge { font-family: var(--font-mono); font-size: 0.6rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .reading-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; line-height: 1.3; }
    .reading-author { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem; }
    .reading-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }

    .newsletter { background: var(--bg-primary); border-top: 1px solid var(--border); text-align: center; }
    .newsletter .section-inner { max-width: 600px; }
    .newsletter .section-desc { margin-left: auto; margin-right: auto; }
    .newsletter-form { display: flex; gap: 0.75rem; max-width: 480px; margin: 0 auto; }
    .newsletter-input {
      flex: 1; padding: 0.9rem 1.2rem; background: var(--bg-card);
      border: 1px solid var(--border); color: var(--text-primary);
      font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.3s;
    }
    .newsletter-input::placeholder { color: var(--text-muted); }
    .newsletter-input:focus { border-color: var(--accent); }
    .newsletter-btn {
      padding: 0.9rem 1.8rem; background: var(--accent); color: var(--bg-primary);
      border: none; font-family: var(--font-body); font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: background 0.3s; white-space: nowrap;
    }
    .newsletter-btn:hover { background: #d4b268; }
    .newsletter-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem; }

    .footer { padding: 3rem 2rem; border-top: 1px solid var(--border); text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.05em; transition: color 0.2s; cursor: pointer; }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy { font-size: 0.75rem; color: var(--text-muted); }
    .footer-disclaimer { font-size: 0.7rem; color: var(--text-muted); max-width: 500px; margin: 1rem auto 0; line-height: 1.5; opacity: 0.6; }

    .tool-page { padding: 6rem 2rem 3rem; }
    .tool-page-inner { max-width: 900px; margin: 0 auto; }
    .tool-back {
      display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted);
      font-size: 0.8rem; letter-spacing: 0.05em; margin-bottom: 2rem;
      cursor: pointer; background: none; border: none; font-family: var(--font-body); transition: color 0.2s;
    }
    .tool-back:hover { color: var(--accent); }
    .tool-page h1 { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 400; margin-bottom: 0.75rem; }
    .tool-page-desc { font-size: 1rem; color: var(--text-secondary); max-width: 650px; line-height: 1.7; margin-bottom: 2.5rem; }

    .calc-container { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; margin-bottom: 2rem; }
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .calc-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .calc-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
    .calc-input {
      padding: 0.8rem 1rem; background: var(--bg-primary); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-mono); font-size: 1rem;
      outline: none; transition: border-color 0.3s;
    }
    .calc-input:focus { border-color: var(--accent); }
    .calc-btn {
      padding: 1rem 2rem; background: var(--accent); color: var(--bg-primary); border: none;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: all 0.3s; margin-top: 0.5rem;
    }
    .calc-btn:hover { background: #d4b268; }

    .results-container { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; animation: fadeIn 0.5s ease; }
    .results-title { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 1.5rem; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 0.85rem; color: var(--text-secondary); }
    .result-value { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
    .result-value.warn { color: var(--red); }

    .insight-box { margin-top: 2rem; padding: 1.5rem; background: var(--accent-glow); border-left: 2px solid var(--accent); }
    .insight-box h4 { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .insight-box p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }

    .streak-visual { margin-top: 2rem; }
    .streak-bar-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .streak-bar-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); min-width: 80px; text-align: right; }
    .streak-bar-track { flex: 1; height: 24px; background: var(--bg-primary); border: 1px solid var(--border); overflow: hidden; }
    .streak-bar-fill { height: 100%; transition: width 0.8s ease; }
    .streak-bar-value { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-primary); min-width: 50px; }

    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }

    .article-page { padding: 6rem 2rem 4rem; }
    .article-inner { max-width: 720px; margin: 0 auto; }
    .article-meta { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; }
    .article-h1 { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 400; line-height: 1.15; margin-bottom: 1rem; }
    .article-tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid rgba(201,165,90,0.3); padding: 0.2rem 0.6rem; display: inline-block; margin-bottom: 2rem; }
    .article-hero-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; margin-bottom: 2.5rem; }

      .nav-links { display: none; }

        bodyHtml: '<p>Let\'s be honest. You\'ve spent hundreds of hours on entries. You\'ve backtested patterns, optimized indicators, watched a thousand YouTube videos on setups.</p>\n<p>And you\'re still not where you should be.</p>\n<p>I\'m going to tell you why, and it\'s going to bother you — because the answer was sitting in front of you the entire time, and almost nobody in this industry talks about it.</p>\n<p>It\'s not your entries. It\'s not your exits. It\'s not your win rate.</p>\n<p>It\'s your bet size.</p>\n<h2>The thought experiment that changed everything for me:</h2>\n<p>Take 10 competent traders. Give them the exact same system. Same entries, same exits, same rules. They execute flawlessly — zero mistakes, zero deviations.</p>\n<p>At the end of 150 trades, all 10 have completely different account balances.</p>\n<p>How is that possible?</p>\n<p>Because each one risked a different percentage per trade. That\'s it. That\'s the only variable. And the outcomes aren\'t slightly different — they\'re wildly different.</p>\n<h2>Here\'s what the math actually shows:</h2>\n<p>I ran Monte Carlo simulations on five traders. Same starting capital. Same market. Same goal: keep maximum drawdown around 30%.</p>\n<p>Trader 1 risked 2.9% per trade. Turned $10K into $48K.</p>\n<p>Trader 2 risked 6.9% per trade — with a system that could handle it. Turned $10K into $442K.</p>\n<p>Same drawdown tolerance. Same timeframe. One made 9x more than the other.</p>\n<p>The difference wasn\'t talent. It wasn\'t discipline. It wasn\'t market timing. It was position sizing — specifically, sizing that was mathematically tuned to their system\'s win rate.</p>\n<h2>Here\'s the part nobody tells you:</h2>\n<p>That trader risking 6.9% wasn\'t being reckless. They had a 70% win rate system, which mathematically supports that bet size within a 30% max drawdown constraint. The trader at 2.9% had a 35% win rate — their system couldn\'t safely handle more.</p>\n<p>Both were sized correctly. Both experienced roughly the same drawdown. But the compounding effect of the larger bet size — applied consistently over 150 trades — created a 9x gap in outcomes.</p>\n<p>This is not theory. This is arithmetic.</p>\n<h2>So why is everyone still talking about entries?</h2>\n<p>Because entries are exciting. Entries feel like skill. "I caught the reversal." "I nailed the breakout." It\'s the part of trading that looks good on social media.</p>\n<p>Position sizing is boring. It\'s a spreadsheet. It\'s a percentage. It doesn\'t make for a good screenshot.</p>\n<p>But it\'s the single largest determinant of whether you build wealth or just tread water.</p>\n<h2>The dirty secret of the "risk 1-2% per trade" rule:</h2>\n<p>Every trading book, every course, every guru tells you: "Risk 1-2% per trade." It sounds responsible. It sounds safe.</p>\n<p>It\'s also complete guesswork.</p>\n<p>That number has no relationship to your actual system. It doesn\'t account for your win rate, your R-multiple, your drawdown tolerance, or your goals. It\'s a one-size-fits-all rule in a game where one size fits nobody.</p>\n<p>A trader with a 70% win rate risking 1% per trade is leaving an obscene amount of money on the table. A trader with a 30% win rate risking 2% might be taking on more risk than they realize.</p>\n<p>The right bet size is the one derived from YOUR system\'s parameters and YOUR risk tolerance. Not some generic rule someone wrote in a book in 1995.</p>\n<h2>What I\'ve learned after 10,000+ hours of live market time:</h2>\n<p>I spent 20 years in petroleum engineering managing billion-dollar assets under uncertainty. Probabilistic models, incomplete data, high-stakes decisions — that was Tuesday.</p>\n<p>When I transitioned to full-time futures trading, I brought one core principle with me: the math doesn\'t care about your feelings.</p>\n<p>Your position size should be calculated, not chosen. It should come from simulation, not intuition. And it should be applied with the same consistency you\'d expect from any other engineering discipline.</p>\n<p>The traders who figure this out compound wealth. The ones who don\'t keep looking for the next setup, the next indicator, the next entry signal — wondering why the account isn\'t growing.</p>\n<h2>The uncomfortable truth:</h2>\n<p>You probably have a good enough system already. Your entries are fine. Your win rate is workable.</p>\n<p>You\'re just sizing wrong.</p>\n<p>And until you fix that, nothing else matters.</p>\n<hr/>\n<blockquote>I\'m writing a book on this — position sizing for futures traders who are done leaving money on the table. More in this series coming soon.</blockquote>'

        bodyHtml: '<p><em>In Article 1, I showed you how ten traders using the exact same system — same entries, same exits, zero mistakes — can produce ten completely different results. The only variable was bet size. If you haven\'t read it, start there. This article builds directly on that proof.</em></p>\n<hr/>\n<p>Everyone in trading repeats the same advice:</p>\n<blockquote>"Risk 1% per trade. Maybe 2% if you\'re feeling brave."</blockquote>\n<p>I\'m going to tell you why that advice is lazy, arbitrary, and quietly destroying your results.</p>\n<h2>How Do They Know?</h2>\n<p>Here\'s my question for every guru who repeats this rule: <em>How do they know?</em></p>\n<p>They don\'t know your win rate. They don\'t know your R-multiple. They don\'t know how much drawdown you can actually stomach before you start making emotional decisions.</p>\n<p>They don\'t know the math. They\'re guessing — and dressing that guess up as wisdom.</p>\n<p>The 1% rule is the trading equivalent of everyone wearing the same shoe size. It sounds like a standard. It gets enforced like a rule. But it fits almost nobody perfectly — and the ones it does fit are just lucky.</p>\n<h2>The Absurdity of One-Size-Fits-All</h2>\n<p>Think about what the 1% rule is actually claiming:</p>\n<p>A trader with a <strong>70% win rate, 2R average system</strong> should risk the same percentage as someone running a <strong>30% win rate, 4R system</strong>?</p>\n<p>A trader willing to accept a <strong>40% drawdown</strong> should risk the same amount as someone who panic-exits at <strong>15%</strong>?</p>\n<p>And here\'s one people miss entirely: account size doesn\'t matter. A $10,000 account and a $500,000 account running the same system with the same risk tolerance should use the same percentage. That\'s the whole point of percentage-based sizing — it scales automatically. So the 1% rule can\'t even use account size as its justification.</p>\n<p>Your optimal bet size is a <strong>system-based decision</strong> — driven entirely by your win rate, your R-multiple, and how much drawdown you can genuinely stomach. Account size is irrelevant to the percentage. The 1% rule ignores all of it.</p>\n<h2>The Cruel Irony</h2>\n<p>Here\'s what makes this particularly maddening:</p>\n<p>Trading is filled with uncertainty. You can\'t predict where price goes. You can\'t know if this trade wins. You can\'t control market conditions.</p>\n<p><strong>But bet sizing? That\'s actually calculable.</strong></p>\n<p>It\'s the one variable in your entire trading operation where math can give you a precise, defensible answer — derived from <em>your</em> system parameters and <em>your</em> risk tolerance.</p>\n<p>Most traders do the opposite. They obsess over entries (uncertain). They agonize over exits (uncertain). They chase better indicators (uncertain).</p>\n<p>Then they guess at their position size — the one thing they could actually get right.</p>\n<h2>What Happens If You Follow It Blindly</h2>\n<p>If you use the 1% rule without doing the math, you land in one of three places:</p>\n<p><strong>Massively under-leveraged.</strong> Your system can support 6-8% risk. You\'re running 1%. You\'re leaving a fortune on the table — every single trade, forever. The compounding opportunity you\'re missing is staggering.</p>\n<p><strong>Coincidentally in the right neighborhood.</strong> Pure luck. Your system happened to produce a number close to 1%. You\'re fine — but you don\'t actually know why, which means you can\'t make intelligent adjustments when your system changes.</p>\n<p><strong>Over-leveraged.</strong> Your system is fragile and 1% is actually too high for your win rate and drawdown tolerance. The rule fails you in the opposite direction.</p>\n<p>One-in-three chance it\'s even close to right. Those are terrible odds for something this important.</p>\n<h2>What Actually Determines Your Optimal Bet Size</h2>\n<p>Three inputs. That\'s all you need. And all three are specific to you:</p>\n<p><strong>1. Your win rate.</strong> How often does your system produce winning trades? This determines the length of your expected losing streaks — which is the primary driver of drawdown.</p>\n<p><strong>2. Your R-multiple.</strong> What\'s your average win relative to your average loss? A 70% win rate system with 1.5R behaves completely differently than a 40% system with 3R — even if the raw expectancy looks similar.</p>\n<p><strong>3. Your maximum acceptable drawdown.</strong> Not what you think you can handle. What you\'ve <em>proven</em> you can handle without abandoning your system, changing your rules, or making emotional decisions.</p>\n<p>Run your system through Monte Carlo analysis — thousands of randomized trade sequences using your actual win rate and R-multiple. What you\'re looking for is the tail. Over 1,000 trades, what does the worst 1% of outcomes look like? That\'s your stress test. That\'s the scenario your position size needs to survive.</p>\n<p>The 1% rule has never seen your simulation. It has no idea what your worst 20-trade stretch looks like. It just picked a number and called it safe.</p>\n<h2>The Proof Is in the Compounding</h2>\n<p>The ten traders I described — same system, same trades, wildly different outcomes — weren\'t using exotic strategies or insider edges. They were using different position sizes. Some were at 1-2%. Some were at 5-8%. The math did the rest over time.</p>\n<p>The spread between the best and worst performer isn\'t marginal. It\'s the difference between a decent supplemental income and generational wealth. Same system. Same trades. Same sequence.</p>\n<p>The only variable was bet size.</p>\n<h2>Start Here</h2>\n<p>Stop guessing at the one thing you can actually get right.</p>\n<p>Calculate your win rate from your trade log. Calculate your average R-multiple. Decide — honestly — what maximum drawdown you can handle without blowing up your execution. Then run the simulations.</p>\n<p>Your optimal bet size isn\'t 1%. It probably isn\'t 2%.</p>\n<p>It\'s whatever the math says it is — derived from your system, your psychology, and your financial situation.</p>\n<blockquote><strong>Bet sizing IS the system.</strong> Everything else is just signal generation.</blockquote>'
      },
      {
        date: 'Featured Article',
        title: 'The Timeless Perspective: An Introduction',
        excerpt: 'You already know how to maintain effortless consistency — you do it every time you’re lazy for a few days. The secret is to point that same psychological state toward behaviors that actually serve you.',
        tag: 'Trading Psychology',
        banner: '',
        bodyHtml: '<h2>You Already Know How to Do This</h2>\n<p>If you have ever been lazy for a day, two days, or three days in a row, you have already accessed the timeless state. You\'ve already experienced what it feels like to maintain a behavior effortlessly, without motivation, without timeline pressure, without any internal negotiation about whether you should continue.</p>\n<p>Think about it: during those lazy periods, you didn\'t need a habit tracker. You didn\'t require accountability systems. You didn\'t struggle with consistency or worry about losing momentum. You didn\'t need to "find your why" or visualize your goals. You just... were lazy, moment after moment, with supernatural consistency.</p>\n<p>You already possess the exact psychological technology you need. You\'ve just been pointing it in the wrong direction.</p>\n<h2>The Problem with Progress</h2>\n<p>We live enslaved to an illusion. Every day, we wake up carrying the weight of imaginary timelines, arbitrary deadlines, and the relentless pressure to make "enough" progress fast "enough." We measure our worth by the speed of our advancement, constantly asking ourselves: Am I losing weight quickly enough? Am I making enough money this quarter? Am I getting fit fast enough?</p>\n<p>But here\'s the uncomfortable truth: this entire framework is a human invention that actively undermines the very results we\'re chasing.</p>\n<h2>The Asymmetry of Ease</h2>\n<p>Consider this paradox: Why is it effortless to maintain bad habits indefinitely, yet so difficult to sustain good ones? Why can you eat poorly for months without any internal negotiation, but maintaining a healthy diet requires constant motivation that inevitably fades?</p>\n<p>The answer isn\'t willpower or character. It\'s that we\'ve fundamentally misunderstood what we\'re trying to do.</p>\n<p>What we typically call "laziness" operates from a timeless perspective. When you\'re scrolling social media or binge-watching Netflix, there\'s no internal timeline pressure. You\'re simply existing in the moment, following your immediate impulses without the overlay of should, must, or need-to-achieve.</p>\n<p>This is the secret that lazy people accidentally discovered: <strong>behaviors without destinations are effortless to maintain indefinitely.</strong></p>\n<h2>The Goal Paradox</h2>\n<p>Here\'s the cruel irony of goal-oriented thinking: you need goals to create a process, but the goals themselves sabotage the process.</p>\n<p>Goals are useful for designing systems and choosing directions. But once you have the process, the goal becomes a psychological liability. Goals create destinations, and destinations create timeline pressure. They make you constantly measure your current position against where you "should" be.</p>\n<p>Worse, achieving a goal often destroys the very behavior that created the achievement. You reach your target weight and suddenly there\'s no reason to maintain the eating habits that got you there. You hit your profit target and start taking more risks because you\'ve already "won."</p>\n<p>The most successful people in any domain use goals to design their systems, then largely forget about the goals and fall in love with the process itself.</p>\n<h2>The Trader\'s Paradox</h2>\n<p>This dynamic plays out most clearly in trading, where the relationship between process and outcome is brutally honest. Every successful trader knows that consistency over hundreds of trades matters more than any individual win or loss. They know that trying to force profits in artificial timeframes leads to overtrading, revenge trading, and blown accounts.</p>\n<p>Yet even knowing this, traders struggle with the same psychological trap: the internal pressure to make "enough" progress "fast enough." This urgency — this productivity anxiety — is exactly what prevents them from executing their edge consistently.</p>\n<h2>Laziness as the Path to Superhuman</h2>\n<p>The laziest person you know can maintain their lazy habits for decades without any motivational speeches, habit trackers, or accountability systems. They just... are lazy, day after day, year after year, with supernatural consistency.</p>\n<p>What if you could access that same effortless consistency but point it toward beneficial behaviors instead?</p>\n<p>You\'re not trying to become lazy. You\'re trying to become lazy about the right things. Lazy about questioning your good choices. Lazy about negotiating with yourself. Lazy about needing motivation to do what you\'ve already decided is who you are.</p>\n<h2>The Validation Trap</h2>\n<p>Why do we create these timeline pressures in the first place? Because we\'ve confused our worth as human beings with our ability to produce timeline-based achievements that impress other people.</p>\n<p>The timeline pressure we create to impress others is exactly what sabotages our ability to get the results that would actually impress them. We\'re so busy trying to show progress quickly that we can\'t access the patient, process-focused state that creates real, lasting progress.</p>\n<h2>Accessing Timelessness: The Real Goal</h2>\n<p>This reveals what we\'re actually trying to accomplish: <strong>accessing the timeless state itself becomes the goal</strong>. Not the healthy eating, not the trading consistency, not any specific outcome — but the frictionless psychological state where those behaviors emerge naturally without effort, resistance, or internal negotiation.</p>\n<p>Instead of "how do I trade consistently?" it becomes "how do I access the state where executing my plan feels as natural as breathing?"</p>\n<h2>The Path Forward</h2>\n<p>The shift from timeline-based anxiety to timeless consistency requires four elements:</p>\n<p><strong>Identity Architecture:</strong> Moving from "someone who tries to do healthy things" to "someone who just is this way." When your identity aligns with your actions, there\'s no internal resistance to overcome.</p>\n<p><strong>Validation Independence:</strong> Breaking free from needing external approval for your choices. Developing genuine self-worth that exists independent of other people\'s opinions or your ability to demonstrate progress on arbitrary schedules.</p>\n<p><strong>Process Worship:</strong> Developing genuine fascination with execution itself, completely separate from outcomes, timelines, or external validation. When the process becomes intrinsically satisfying, motivation becomes irrelevant.</p>\n<p><strong>Frictionless Systems:</strong> Creating environmental and routine structures that make beneficial choices the path of least resistance.</p>\n<hr/>\n<p>If you\'ve ever been lazy for even a single day, you\'ve already proven you can access this state. You already possess the psychological technology. The only question is: are you ready to point it in a direction that actually serves you?</p>'
      }
    ];

            return res.text();

          .then(html => {
            // Extract generation timestamp from comment if present
            const match = html.match(/generated\s+(\d{4}-\d{2}-\d{2}T[\d:.]+Z)/);
            if (match) {
              const d = new Date(match[1]);
              setLastUpdated(d.toLocaleString('en-US', { 
                timeZone: 'America/New_York', 
                month: 'short', day: 'numeric', 
                hour: 'numeric', minute: '2-digit', hour12: true

            <section className="tool-page">
              <div className="tool-page-inner">
                <button className="tool-back" onClick={() => setPage('home')}>← Back to Home</button>
                <h1>Trading Tools</h1>
                <p className="tool-page-desc">Psychological preparation meets mathematical reality. Start with the Losing Streak Estimator — live now.</p>
                <div className="tools-grid">
                  {TOOLS.map(tool => (
                    <div key={tool.id} className="tool-card">
                      <div className={`tool-status ${tool.status}`}>{tool.status.toUpperCase()}</div>
                      <div className="tool-icon">{tool.icon}</div>
                      <h3 className="tool-name">{tool.name}</h3>
                      <p className="tool-desc">{tool.desc}</p>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          )}

          {page === 'blog' && (
            <section className="tool-page">
              <div className="tool-page-inner">
                <button className="tool-back" onClick={() => setPage('home')}>← Back to Home</button>
                <h1>Articles & Deep Dives</h1>
                <p className="tool-page-desc">Long-form thinking on position sizing, psychology, and timeless execution.</p>
                <div className="blog-grid" style={{marginTop:'2rem'}}>
                  {BLOG_POSTS.map((post, i) => (
                    <div key={i} className="blog-card" onClick={() => setPage('article-' + i)}>
                      {post.banner && post.banner.length > 10 && <img src={post.banner} alt={post.title} className="blog-banner" />}
                      <div className="blog-card-body">
                        <div className="blog-date">{post.date}</div>
                        <h3 className="blog-title">{post.title}</h3>
                        <p className="blog-excerpt">{post.excerpt}</p>
                        <div className="blog-tag">{post.tag}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          )}

          {page === 'book' && (
            <section style={{padding:'6rem 2rem 4rem'}}>
              <div className="section-inner">
                <button className="tool-back" onClick={() => setPage('home')}>← Back to Home</button>
                <div className="book-layout" style={{marginTop:'2rem'}}>
                  <div className="book-cover">
                    <div className="book-cover-tag">COMING 2026</div>
                    <h2 className="book-cover-title">Position Sizing</h2>
                    <p className="book-cover-subtitle">The Most Underutilized Edge in Trading</p>
                  </div>
                  <div className="book-info">
                    <h3>Most traders have an <em>edge</em>.<br/>They just aren't <em>sized</em> for it.</h3>
                    <p>After 10,000+ hours, multiple elite psychology coaches, and turning $10K into $207K in 2025 through psychology-first sizing — I'm writing the book I wish existed when I started.</p>
                    <p className="book-quote">
                      "You don't blow up because your system failed.<br/>You blow up because your <em>size</em> failed your psychology."
                    </p>
                    <p>Join the waitlist for early chapters, tools, and launch updates.</p>
                    <div className="newsletter-form" style={{marginTop:'1.5rem', maxWidth:'420px'}}>
                      <input className="newsletter-input" placeholder="your@email.com" type="email" />
                      <button className="newsletter-btn">Join Waitlist</button>
                    </div>
                    <p className="newsletter-note">No spam. Early access only.</p>
                  </div>
                </div>
              </div>
            </section>
          )}

          {BLOG_POSTS.map((post, i) => page === 'article-' + i && (
            <div key={i} className="article-page">
              <div className="article-inner">
                <button className="tool-back" onClick={() => { setPage('blog'); window.scrollTo(0,0); }}>← Back to Blog</button>
                <div className="article-meta">{post.date}</div>
                <h1 className="article-h1">{post.title}</h1>
                <div className="article-tag">{post.tag}</div>
                {post.banner && post.banner.length > 10 && <img src={post.banner} alt={post.title} className="article-hero-img" />}
                <div className="article-body" dangerouslySetInnerHTML={{__html: post.bodyHtml}} />
                <div className="article-footer">
                  <button className="btn-secondary" onClick={() => { setPage('blog'); window.scrollTo(0,0); }}>← All Articles</button>
                </div>
              </div>
            </div>
          ))}

          <Footer setPage={setPage} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
