    .milestone { padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border); transition: border-color 0.3s; }
    .milestone:hover { border-color: var(--accent-dim); }
    .milestone-year { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .milestone-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; margin-bottom: 0.4rem; }
    .milestone-desc { font-size: 0.85rem; color: var(--text-muted); }
    .milestone-img {
      width: 100%; margin-top: 1rem; border: 1px solid var(--border);

    }

    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .tool-card {

    }

    .tool-card::after {

    .tool-card:hover::after { transform: scaleX(1); }
    .tool-icon {

    .tool-status { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.2rem 0.6rem; display: inline-block; margin-bottom: 0.75rem; }

    .book-cover-title { font-family: var(--font-display); font-size: 2rem; font-weight: 600; line-height: 1.2; margin-bottom: 0.5rem; }
    .book-cover-subtitle { font-family: var(--font-display); font-size: 1rem; font-style: italic; color: var(--text-secondary); }
    .book-info h3 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 400; margin-bottom: 1.2rem; }
    .book-info h3 em { font-style: italic; color: var(--accent); }
    .book-info p { color: var(--text-secondary); line-height: 1.8; margin-bottom: 1rem; }
    .book-quote { border-left: 2px solid var(--accent); padding: 1rem 1.5rem; margin: 2rem 0; font-family: var(--font-display); font-size: 1.2rem; font-style: italic; color: var(--text-primary); line-height: 1.6; }

    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .blog-card { background: var(--bg-card); border: 1px solid var(--border); padding: 2rem; transition: all 0.3s; }
    .blog-card:hover { border-color: var(--accent-dim); }
    .blog-date { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .blog-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; }
    .blog-excerpt { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }
    .blog-tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1rem; display: inline-block; }

    .books { background: var(--bg-secondary); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .book-category { margin-bottom: 2rem; }
    .book-category-title {
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent);
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .book-item {
      padding: 0.8rem 1rem; background: var(--bg-card); border: 1px solid var(--border);
      transition: border-color 0.3s; margin-bottom: 0.5rem;
    }
    .book-item:hover { border-color: var(--accent-dim); }
    .book-item-title { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
    .book-item-author { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; }
    .book-item.mentor { border-color: var(--accent-dim); background: linear-gradient(135deg, var(--bg-card) 0%, rgba(201,165,90,0.06) 100%); position: relative; }
    .book-item.mentor .book-item-title { color: var(--accent); }
    .book-mentor-badge {
      font-family: var(--font-mono); font-size: 0.55rem; color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase; display: inline-block;
      border: 1px solid rgba(201,165,90,0.3); padding: 0.1rem 0.45rem;
      margin-left: 0.6rem; vertical-align: middle; background: rgba(201,165,90,0.08);
    }

    .newsletter { background: var(--bg-primary); border-top: 1px solid var(--border); text-align: center; }
    .newsletter .section-inner { max-width: 600px; }
    .newsletter .section-desc { margin-left: auto; margin-right: auto; }
    .newsletter-form { display: flex; gap: 0.75rem; max-width: 480px; margin: 0 auto; }
    .newsletter-input {
      flex: 1; padding: 0.9rem 1.2rem; background: var(--bg-card);
      border: 1px solid var(--border); color: var(--text-primary);
      font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.3s;
    }
    .newsletter-input::placeholder { color: var(--text-muted); }
    .newsletter-input:focus { border-color: var(--accent); }
    .newsletter-btn {
      padding: 0.9rem 1.8rem; background: var(--accent); color: var(--bg-primary);
      border: none; font-family: var(--font-body); font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: background 0.3s; white-space: nowrap;
    }
    .newsletter-btn:hover { background: #d4b268; }
    .newsletter-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 1rem; }

    .footer { padding: 3rem 2rem; border-top: 1px solid var(--border); text-align: center; }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.05em; transition: color 0.2s; cursor: pointer; }
    .footer-links a:hover { color: var(--accent); }
    .footer-copy { font-size: 0.75rem; color: var(--text-muted); }
    .footer-disclaimer { font-size: 0.7rem; color: var(--text-muted); max-width: 500px; margin: 1rem auto 0; line-height: 1.5; opacity: 0.6; }

    .tool-page { padding: 6rem 2rem 3rem; }
    .tool-page-inner { max-width: 900px; margin: 0 auto; }
    .tool-back {
      display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted);
      font-size: 0.8rem; letter-spacing: 0.05em; margin-bottom: 2rem;
      cursor: pointer; background: none; border: none; font-family: var(--font-body); transition: color 0.2s;
    }
    .tool-back:hover { color: var(--accent); }
    .tool-page h1 { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 400; margin-bottom: 0.75rem; }
    .tool-page-desc { font-size: 1rem; color: var(--text-secondary); max-width: 650px; line-height: 1.7; margin-bottom: 2.5rem; }

    .calc-container { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; margin-bottom: 2rem; }
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .calc-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .calc-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
    .calc-input {
      padding: 0.8rem 1rem; background: var(--bg-primary); border: 1px solid var(--border);
      color: var(--text-primary); font-family: var(--font-mono); font-size: 1rem;
      outline: none; transition: border-color 0.3s;
    }
    .calc-input:focus { border-color: var(--accent); }
    .calc-btn {
      padding: 1rem 2rem; background: var(--accent); color: var(--bg-primary); border: none;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: all 0.3s; margin-top: 0.5rem;
    }
    .calc-btn:hover { background: #d4b268; }

    .results-container { background: var(--bg-card); border: 1px solid var(--border); padding: 2.5rem; animation: fadeIn 0.5s ease; }
    .results-title { font-family: var(--font-display); font-size: 1.4rem; margin-bottom: 1.5rem; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 0.85rem; color: var(--text-secondary); }
    .result-value { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
    .result-value.warn { color: var(--red); }

    .insight-box { margin-top: 2rem; padding: 1.5rem; background: var(--accent-glow); border-left: 2px solid var(--accent); }
    .insight-box h4 { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .insight-box p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }

    .streak-visual { margin-top: 2rem; }
    .streak-bar-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.75rem; }
    .streak-bar-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); min-width: 80px; text-align: right; }
    .streak-bar-track { flex: 1; height: 24px; background: var(--bg-primary); border: 1px solid var(--border); overflow: hidden; }
    .streak-bar-fill { height: 100%; transition: width 0.8s ease; }
    .streak-bar-value { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-primary); min-width: 50px; }

    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero-stats { flex-direction: column; gap: 1.5rem; }
      .about-grid, .book-layout { grid-template-columns: 1fr; gap: 2rem; }
      .calc-grid { grid-template-columns: 1fr; }
      .newsletter-form { flex-direction: column; }
      .tools-grid { grid-template-columns: 1fr; }
      section { padding: 2rem 1.25rem; }
      .hero { padding: 6rem 1.25rem 2rem; }
      .calc-container, .results-container { padding: 1.5rem; }
    }
  </style>
</head>

    /* ── MATH ─────────────────────────────────────────────────────── */
    function calcStreak(winRate, n) {
      var p = 1 - winRate;
      if (p <= 0 || p >= 1 || n < 1) return null;
      var expected = Math.log(n * p) / Math.log(1/p);
      function prob(k) { var pk=Math.pow(p,k); return Math.min(1, 1-Math.pow(1-pk, Math.max(1,n-k+1))); }
      function find(t) { for(var k=1;k<=n;k++) if(prob(k)<t) return k-1; return n; }
      return {
        expected: Math.max(1,Math.round(expected)),
        almostCertain: Math.max(1,find(0.95)),
        likely: Math.max(1,find(0.50)),
        possible: Math.max(1,find(0.10)),
        rare: Math.max(1,find(0.02)),
        extreme: Math.max(1,find(0.01))
      };
    }

    /* ── TIMELESS PERSPECTIVE ──────────────────────────────────────── */
    function TimelessPerspective() {
      var es = useState(false), expanded = es[0], setExpanded = es[1];
      return h('section',{className:'tp-section',id:'framework'},
        h('div',{className:'section-inner'},
          h('div',{className:'section-tag'},'The Framework'),
          h('h2',{className:'section-title'},'The Timeless Perspective'),
          h('div',{className:'tp-content'},
            h('h3',null,'You Already Know How to Do This'),
            h('p',null,'If you have ever been lazy for a day, two days, or three days in a row, you have already accessed the timeless state. You\u2019ve already experienced what it feels like to maintain a behavior effortlessly, without motivation, without timeline pressure, without any internal negotiation about whether you should continue.'),
            h('p',null,'Think about it: during those lazy periods, you didn\u2019t need a habit tracker. You didn\u2019t require accountability systems. You didn\u2019t struggle with consistency or worry about losing momentum. You didn\u2019t need to \u201Cfind your why\u201D or visualize your goals. You just... were lazy, moment after moment, with supernatural consistency.'),
            h('div',{className:'tp-pullquote'},'You already possess the exact psychological technology you need. You\u2019ve just been pointing it in the wrong direction.'),

            h('h3',null,'The Asymmetry of Ease'),
            h('p',null,'Consider this paradox: Why is it effortless to maintain bad habits indefinitely, yet so difficult to sustain good ones? Why can you eat poorly for months without any internal negotiation, but maintaining a healthy diet requires constant motivation that inevitably fades?'),
            h('p',null,'The answer isn\u2019t willpower or character. It\u2019s that we\u2019ve fundamentally misunderstood what we\u2019re trying to do. What we typically call \u201Claziness\u201D operates from a timeless perspective \u2014 no internal timeline pressure, no destination obsession. Behaviors without destinations are effortless to maintain indefinitely.'),

            expanded && h(React.Fragment,null,
              h('h3',null,'The Goal Paradox'),
              h('p',null,'Here\u2019s the cruel irony of goal-oriented thinking: you need goals to create a process, but the goals themselves sabotage the process. Goals create destinations, and destinations create timeline pressure. They make you constantly measure your current position against where you \u201Cshould\u201D be.'),
              h('p',null,'Worse, achieving a goal often destroys the very behavior that created the achievement. You reach your target weight and suddenly there\u2019s no reason to maintain the eating habits that got you there. You hit your profit target and start taking more risks because you\u2019ve already \u201Cwon.\u201D'),
              h('p',null,'The most successful people in any domain understand this paradox intuitively. They use goals to design their systems, then largely forget about the goals and fall in love with the process itself.'),

              h('h3',null,'Laziness as the Path to Superhuman'),
              h('p',null,'The laziest person you know can maintain their lazy habits for decades without any motivational speeches, habit trackers, or accountability systems. What if you could access that same effortless consistency but point it toward beneficial behaviors instead?'),
              h('p',null,'You\u2019re not trying to become lazy. You\u2019re trying to become ',h('em',null,'lazy about the right things'),'. Lazy about questioning your good choices. Lazy about negotiating with yourself. Lazy about needing motivation to do what you\u2019ve already decided is who you are.'),

              h('h3',null,'The Ultimate Truth: It\u2019s All Made Up'),
              h('p',null,'Time, as we experience it psychologically, doesn\u2019t actually exist. It\u2019s a complete human fabrication. We created clocks, calendars, and schedules, then convinced ourselves they were real. Every \u201Cdeadline\u201D is made up. Every \u201Ctimeline\u201D is arbitrary. Every sense of urgency about achieving something by a certain date is based on completely fabricated constraints.'),
              h('p',null,'This isn\u2019t nihilistic. It\u2019s profoundly freeing. If time pressure is an illusion we\u2019ve created, then we can choose not to participate in it. The irony is that when you truly accept that it\u2019s all made up, you often end up accomplishing more, not less.'),

              h('h3',null,'The Path Forward'),
              h('p',null,h('strong',null,'Identity Architecture: '),'Moving from \u201Csomeone who tries to do healthy things\u201D to \u201Csomeone who just is this way.\u201D When your identity aligns with your actions, there\u2019s no internal resistance to overcome.'),
              h('p',null,h('strong',null,'Validation Independence: '),'Breaking free from the psychological trap of needing external approval for your choices. Until you can value yourself simply for existing, you\u2019ll remain trapped in performance anxiety.'),
              h('p',null,h('strong',null,'Process Worship: '),'Developing genuine fascination with execution itself, completely separate from outcomes, timelines, or external validation. When the process becomes intrinsically satisfying, motivation becomes irrelevant.'),
              h('p',null,h('strong',null,'Frictionless Systems: '),'Creating environmental and routine structures that make beneficial choices the path of least resistance.'),

              h('div',{className:'tp-pullquote'},'If you\u2019ve ever been lazy for even a single day, you\u2019ve already proven you can access this state. You already possess the psychological technology. The only question is: are you ready to point it in a direction that actually serves you?')
            ),

            h('button',{className:'tp-expand',onClick:function(){setExpanded(!expanded)}},
              expanded ? 'Show Less \u2191' : 'Read the Full Framework \u2192'
            )
          )
        )
      );
    }

    /* ── TOOLS SECTION ────────────────────────────────────────────── */
    function ToolsSection(p) {
      return h('section',{id:'tools'},
        h('div',{className:'section-inner'},
          h('div',{className:'section-tag'},'Free Tools'),
          h('h2',{className:'section-title'},'Built for serious traders'),
          h('p',{className:'section-desc'},'Interactive tools designed to bridge the gap between knowing your edge and having the psychological capacity to express it through position size.'),
          h('div',{className:'tools-grid'},
            TOOLS.map(function(t){
              return h('div',{key:t.id,className:'tool-card',onClick:function(){if(t.status==='live')p.setPage(t.id)}},
                h('div',{className:'tool-icon'},t.icon),
                h('div',{className:'tool-status '+t.status},t.status==='live'?'\u25CF Live':'\u25CB Coming Soon'),
                h('div',{className:'tool-name'},t.name),
                h('div',{className:'tool-desc'},t.desc)
              );
            })
          )
        )
      );
    }

    /* ── BLOG ─────────────────────────────────────────────────────── */

          h('div',{className:'section-tag'},'Blog'),

      );
    }

    /* ── BOOKS ─────────────────────────────────────────────────────── */
    function BooksSection() {
      var categories = Object.keys(BOOKS);
      return h('section',{className:'books',id:'books'},
        h('div',{className:'section-inner'},
          h('div',{className:'section-tag'},'Recommended Reading'),
          h('h2',{className:'section-title'},'Books That Shaped My Trading'),
          h('p',{className:'section-desc'},'The traders who do the work off the screen are the ones who perform on it. These books changed how I think about risk, psychology, and performance.'),
          h('div',{className:'books-grid'},
            categories.map(function(cat){
              return h('div',{className:'book-category',key:cat},
                h('div',{className:'book-category-title'},cat),
                BOOKS[cat].map(function(book,i){
                  return h('div',{className:'book-item'+(book.mentor?' mentor':''),key:i},
                    h('div',{className:'book-item-title'},book.title, book.mentor ? h('span',{className:'book-mentor-badge'},'My Mentor') : null),
                    h('div',{className:'book-item-author'},book.author)
                  );
                })
              );
            })
          )
        )
      );
    }

    /* ── NEWSLETTER ───────────────────────────────────────────────── */
    function Newsletter() {
      var es=useState(''), email=es[0], setE=es[1];
      var ss=useState(false), done=ss[0], setD=ss[1];
      return h('section',{className:'newsletter',id:'newsletter'},
        h('div',{className:'section-inner'},
          h('div',{className:'section-tag'},'Newsletter'),
          h('h2',{className:'section-title'},'Stay in the loop'),
          h('p',{className:'section-desc'},'Get new tools, book updates, and trading psychology insights delivered to your inbox. No spam, no fluff \u2014 just signal.'),
          !done
            ? h(F,null,
                h('div',{className:'newsletter-form'},
                  h('input',{className:'newsletter-input',type:'email',placeholder:'your@email.com',value:email,onChange:function(ev){setE(ev.target.value)}}),
                  h('button',{className:'newsletter-btn',onClick:function(){if(email.includes('@'))setD(true)}},'Subscribe')
                ),
                h('p',{className:'newsletter-note'},'Join traders who think differently about risk.')
              )
            : h('p',{style:{color:'var(--green)',fontFamily:'var(--font-mono)',fontSize:'0.9rem'}},'\u2713 You\u2019re in. Watch your inbox.')
        )
      );
    }

    /* ── FOOTER ───────────────────────────────────────────────────── */
    function Footer(p) {
      function go(sec){ p.setPage('home'); scrollTo(sec); }
      return h('footer',{className:'footer'},
        h('div',{className:'footer-links'},
          h('a',{onClick:function(){p.setPage('home')}},'Home'),
          h('a',{href:'https://x.com/CandyCabin75',target:'_blank',rel:'noopener'},'X / Twitter'),
          h('a',{onClick:function(){go('tools')}},'Tools'),
          h('a',{onClick:function(){go('book')}},'Book'),
          h('a',{onClick:function(){go('newsletter')}},'Newsletter')
        ),
        h('div',{className:'footer-copy'},'\u00A9 2026 The Timeless Perspective. All rights reserved.'),
        h('div',{className:'footer-disclaimer'},'Trading involves substantial risk of loss and is not suitable for all investors. Past performance does not guarantee future results.')
      );
    }

    /* ── LOSING STREAK TOOL ───────────────────────────────────────── */
    function LosingStreakTool(p) {
      var ws=useState('50'), wr=ws[0], setWr=ws[1];
      var ts=useState('10'), tpw=ts[0], setTpw=ts[1];
      var ks=useState('4'), wks=ks[0], setWks=ks[1];
      var rs=useState(null), res=rs[0], setRes=rs[1];

      function calc() {
        var w=parseFloat(wr)/100, t=parseInt(tpw), k=parseInt(wks);
        if(isNaN(w)||isNaN(t)||isNaN(k)||w<=0||w>=1||t<1||k<1) return;
        var n=t*k, r=calcStreak(w,n);
        if(r) setRes(Object.assign({},r,{total:n,wr:w}));
      }

      var bars = res ? [
        {label:'>95%',val:res.almostCertain,color:'var(--green)'},
        {label:'>50%',val:res.likely,color:'var(--accent)'},
        {label:'>10%',val:res.possible,color:'#d4803a'},
        {label:'2%',val:res.rare,color:'#e07040'},
        {label:'1%',val:res.extreme,color:'var(--red)'}
      ] : [];
      var max = res ? res.extreme : 1;

      var insight = '';
      if(res) {
        var pct = (res.wr*100).toFixed(0);
        if(res.likely>=5) insight='With a '+pct+'% win rate over '+res.total+' trades, you should expect '+res.likely+'+ consecutive losses \u2014 and there\u2019s a real chance of hitting '+res.possible+'+. If your sizing can\u2019t survive '+res.rare+' losses in a row without breaking your psychology, you\u2019re sized too aggressively. The goal isn\u2019t to avoid the streak \u2014 it\u2019s to size so the streak doesn\u2019t matter.';
        else if(res.likely>=3) insight='Even with a solid '+pct+'% win rate, '+res.likely+'\u2013'+res.possible+' consecutive losses are well within normal range. Most traders abandon winning systems during these perfectly normal rough patches. Size so that even the rare '+res.rare+'-loss streak only draws down 10\u201315% of your account.';
        else insight='Your high win rate protects you from long streaks, but '+res.possible+'+ consecutive losses can still happen. The danger isn\u2019t the streak itself \u2014 it\u2019s the false confidence your win rate creates. When the unlikely happens, sized-up traders get destroyed because they never believed it could.';
      }

      return h('section',{className:'tool-page'},
        h('div',{className:'tool-page-inner'},
          h('button',{className:'tool-back',onClick:function(){p.setPage('home');scrollTo('tools');}},'\u2190 Back to Tools'),
          h('div',{className:'section-tag'},'Free Tool'),
          h('h1',null,'Losing Streak Estimator'),
          h('p',{className:'tool-page-desc'},
            'Every system produces losing streaks. The question isn\u2019t ',h('em',null,'if'),' \u2014 it\u2019s ',h('em',null,'how bad'),
            '. Enter your system parameters to see what you should psychologically prepare for. The traders who survive their worst streak are the ones who expected it.'
          ),
          h('div',{className:'calc-container'},
            h('div',{className:'calc-grid'},
              h('div',{className:'calc-field'},
                h('label',{className:'calc-label'},'Win Rate (%)'),
                h('input',{className:'calc-input',type:'number',min:'1',max:'99',value:wr,onChange:function(e){setWr(e.target.value)}})
              ),
              h('div',{className:'calc-field'},
                h('label',{className:'calc-label'},'Trades Per Week'),
                h('input',{className:'calc-input',type:'number',min:'1',max:'200',value:tpw,onChange:function(e){setTpw(e.target.value)}})
              ),
              h('div',{className:'calc-field'},
                h('label',{className:'calc-label'},'Rough Stretch (Weeks)'),
                h('input',{className:'calc-input',type:'number',min:'1',max:'52',value:wks,onChange:function(e){setWks(e.target.value)}})
              ),
              h('div',{className:'calc-field',style:{justifyContent:'flex-end'}},
                h('button',{className:'calc-btn',onClick:calc},'Calculate Worst Streak \u2192')
              )
            )
          ),
          res && h('div',{className:'results-container'},
            h('div',{className:'results-title'},'Over '+res.total+' trades at '+(res.wr*100).toFixed(0)+'% win rate'),
            h('div',{className:'result-row'},h('span',{className:'result-label'},'Almost Certain (>95% chance)'),h('span',{className:'result-value'},res.almostCertain+' losses in a row')),
            h('div',{className:'result-row'},h('span',{className:'result-label'},'Likely (>50% chance)'),h('span',{className:'result-value'},res.likely+' losses in a row')),
            h('div',{className:'result-row'},h('span',{className:'result-label'},'Possible (>10% chance)'),h('span',{className:'result-value warn'},res.possible+' losses in a row')),
            h('div',{className:'result-row'},h('span',{className:'result-label'},'Rare \u2014 2% occurrence'),h('span',{className:'result-value warn'},res.rare+' losses in a row')),
            h('div',{className:'result-row'},h('span',{className:'result-label'},'Extreme \u2014 1% occurrence'),h('span',{className:'result-value warn'},res.extreme+' losses in a row')),
            h('div',{className:'streak-visual'},
              bars.map(function(b,i){
                return h('div',{className:'streak-bar-row',key:i},
                  h('span',{className:'streak-bar-label'},b.label),
                  h('div',{className:'streak-bar-track'},
                    h('div',{className:'streak-bar-fill',style:{width:(b.val/max*100)+'%',background:b.color}})
                  ),
                  h('span',{className:'streak-bar-value'},b.val)
                );
              })
            ),
            h('div',{className:'insight-box'},
              h('h4',null,'Psychological Insight'),
              h('p',null,insight)
            )
          )
        )
      );
    }

    /* ── APP ──────────────────────────────────────────────────────── */
    function App() {
      var ps=useState('home'), page=ps[0], setPage=ps[1];
      var nav = useCallback(function(pg){ setPage(pg); window.scrollTo(0,0); },[]);
      return h(F,null,
        h(Nav,{currentPage:page,setPage:nav}),
        page==='home' && h(F,null,h(Hero,{setPage:nav}),h(About),h(TimelessPerspective),h(ToolsSection,{setPage:nav}),h(BookSection),h(BlogSection),h(BooksSection),h(Newsletter)),
        page==='losing-streak' && h(LosingStreakTool,{setPage:nav}),
        h(Footer,{setPage:nav})
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
